<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <title>Simulateur de Distillation - Cobalith Studio</title>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <img src="logo.png" alt="Logo Cobalith Studio" />
        <span>Cobalith Studio</span>
    </a>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="simulateur.html">Simulateur</a>
    </nav>
</header>

<main>
    <section id="spirits-sim">
        <h2>Simulateur de Distillation</h2>
        <div class="simulator-container">

            <!-- Colonne gauche -->
            <div class="simulator-col gauche">
                <div class="project-card">
                    <h3>Matière de départ</h3>
                    <div class="form-field">
                        <label for="select-matiere">Base :</label>
                        <select id="select-matiere">
                            <option value="" selected disabled hidden></option>
                        </select>
                    </div>

                    <div id="bloc-mout-choix" style="display: none;">
                        <div class="form-field">
                            <label for="select-mout1">Céréale principale :</label>
                            <select id="select-mout1"></select>
                        </div>
                        <div class="form-field">
                            <label for="select-mout2">Céréale secondaire :</label>
                            <select id="select-mout2"></select>
                        </div>
                    </div>
                </div>

                <div class="project-card" id="bloc-fermentation" style="display: none;">
                    <h3>Fermentation</h3>
                    <div class="form-field">
                        <label for="select-levure">Type de levure :</label>
                        <select id="select-levure"></select>
                    </div>
                    <div class="form-field">
                        <label for="select-temp-fermentation">Température :</label>
                        <select id="select-temp-fermentation"></select>
                    </div>
                    <div class="form-field">
                        <label for="select-duree-fermentation">Durée :</label>
                        <select id="select-duree-fermentation"></select>
                    </div>
                </div>

                <div class="project-card" id="bloc-aromatisation" style="display: none;">
                    <h3>Aromatisation</h3>
                    <div class="form-field">
                        <label for="select-aromes-oui-non">Aromatisé ?</label>
                        <select id="select-aromes-oui-non"></select>
                    </div>

                    <div id="bloc-aromes-detail" style="display: none;">
                        <div class="form-field">
                            <label for="select-aromate-tech">Méthode d’extraction :</label>
                            <select id="select-aromate-tech"></select>
                        </div>
                        <div class="form-field">
                            <label for="select-aromes">Arômes :</label>
                            <select id="select-aromes" multiple></select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Colonne centre -->
            <div class="simulator-col centre">
                <div class="project-card">
                    <h3>Distillation</h3>
                    <div class="form-field">
                        <label for="select-alambic">Type d’alambic :</label>
                        <select id="select-alambic"></select>
                    </div>

                    <div id="bloc-distillation-passes" style="display: none;">
                        <div class="form-field">
                            <label for="select-passe1">1ère passe :</label>
                            <select id="select-passe1"></select>
                        </div>
                        <div class="form-field">
                            <label for="select-passe2">2ᵉ passe :</label>
                            <select id="select-passe2"></select>
                        </div>
                    </div>
                </div>

                <div class="project-card">
                    <h3>Élevage</h3>

                    <div class="form-field">
                        <label for="select-dilution">Taux d’alcool visé (% vol) :</label>
                        <select id="select-dilution"></select>
                    </div>

                    <div class="form-field">
                        <label for="select-vieillissement">Durée :</label>
                        <select id="select-vieillissement"></select>
                    </div>

                    <div class="form-field" id="bloc-fut" style="display: none;">
                        <label for="select-fut">Contenant :</label>
                        <select id="select-fut"></select>
                    </div>

                    <div class="form-field">
                        <label for="select-sucre">Ajout de sucre :</label>
                        <select id="select-sucre"></select>
                    </div>

                    <div class="form-field">
                        <label for="select-filtration">Filtration :</label>
                        <select id="select-filtration"></select>
                    </div>
                </div>
            </div>

            <!-- Colonne droite -->
            <div class="simulator-col right">
                <div class="project-card">
                    <h3>Spiritueux simulé</h3>
                    <p><strong>Type estimé :</strong> <span id="val-type">—</span></p>
                    <p><strong>Style :</strong> <span id="val-style">—</span></p>
                    <hr style="margin: 1rem 0; border-color: var(--main-color);">
                    <p><strong>Alcool :</strong> <span id="val-alcool">—</span> % vol</p>
                    <p><strong>Sucre résiduel :</strong> <span id="val-sucre">—</span></p>
                    <p><strong>Couleur :</strong> <span id="val-couleur">—</span></p>
                    <hr style="margin: 1rem 0; border-color: var(--main-color);">
                    <p><strong>Arômes :</strong> <span id="val-aromes">—</span></p>
                </div>
            </div>

        </div>
    </section>
</main>

<footer>
    &copy; 2025 Cobalith Studio. Tous droits réservés.
</footer>

<script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
<script src="simulateur-spiritueux.js"></script>

</body>
</html>
